<svg xmlns="http://www.w3.org/2000/svg" width="950" height="700" viewBox="0 0 950 700">
  <defs>
    <linearGradient id="plane3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd89b"/>
      <stop offset="50%" stop-color="#ff9a56"/>
      <stop offset="100%" stop-color="#c7254e"/>
    </linearGradient>
    <linearGradient id="bg3d" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f9fa"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg3d)"/>
  <text x="475" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#111">3D Model: Price vs. Latitude & Longitude</text>
  
  <!-- Grid and axes -->
  <g stroke="#d9e2f2" stroke-width="1.5" opacity="0.6">
    <!-- Back grid lines -->
    <line x1="280" y1="450" x2="280" y2="150"/>
    <line x1="350" y1="430" x2="350" y2="140"/>
    <line x1="420" y1="410" x2="420" y2="130"/>
    <line x1="490" y1="390" x2="490" y2="120"/>
    <line x1="560" y1="370" x2="560" y2="110"/>
    <line x1="630" y1="350" x2="630" y2="100"/>
    <!-- Side grid lines -->
    <line x1="200" y1="450" x2="630" y2="350"/>
    <line x1="200" y1="500" x2="630" y2="400"/>
    <line x1="200" y1="550" x2="630" y2="450"/>
  </g>
  
  <!-- Fitted regression plane -->
  <polygon points="200,500 630,350 750,420 320,570" fill="url(#plane3d)" opacity="0.85" stroke="#a94442" stroke-width="2"/>
  
  <!-- Data points as circles -->
  <g fill="#4472c4" stroke="#1b3b6f" stroke-width="1.2" opacity="0.9">
    <circle cx="245" cy="465" r="4.5"/>
    <circle cx="275" cy="440" r="4.5"/>
    <circle cx="298" cy="490" r="4.5"/>
    <circle cx="320" cy="415" r="4.5"/>
    <circle cx="345" cy="475" r="4.5"/>
    <circle cx="368" cy="445" r="4.5"/>
    <circle cx="390" cy="410" r="4.5"/>
    <circle cx="415" cy="485" r="4.5"/>
    <circle cx="438" cy="450" r="4.5"/>
    <circle cx="460" cy="425" r="4.5"/>
    <circle cx="485" cy="470" r="4.5"/>
    <circle cx="508" cy="408" r="4.5"/>
    <circle cx="530" cy="455" r="4.5"/>
    <circle cx="555" cy="428" r="4.5"/>
    <circle cx="578" cy="475" r="4.5"/>
    <circle cx="600" cy="435" r="4.5"/>
    <circle cx="625" cy="465" r="4.5"/>
    <circle cx="655" cy="375" r="4.5"/>
    <circle cx="685" cy="430" r="4.5"/>
  </g>
  
  <!-- Axis lines -->
  <g stroke="#222" stroke-width="2.5">
    <line x1="200" y1="500" x2="200" y2="150"/>
    <line x1="200" y1="500" x2="630" y2="350"/>
    <line x1="200" y1="500" x2="320" y2="570"/>
  </g>
  
  <!-- Axis labels -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#2c3e50" font-weight="500">
    <text x="470" y="610" text-anchor="middle">longitude</text>
    <text x="105" y="325" text-anchor="middle" transform="rotate(-90 105 325)">latitude</text>
    <text x="160" y="280" text-anchor="middle" transform="rotate(45 160 280)">price</text>
  </g>
  
  <!-- Legend -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#555">
    <circle cx="750" cy="120" r="4" fill="#4472c4" stroke="#1b3b6f"/>
    <text x="770" y="126" text-anchor="start">Actual data</text>
    <rect x="750" y="145" width="12" height="12" fill="url(#plane3d)" stroke="#a94442"/>
    <text x="770" y="156" text-anchor="start">Fitted plane</text>
  </g>
</svg>
