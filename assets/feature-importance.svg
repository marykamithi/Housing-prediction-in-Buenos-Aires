<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="posGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a9d8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06a77d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="negGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e76f51;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d63230;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="620" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="450" y="35" font-size="26" font-weight="bold" text-anchor="middle" fill="#2c3e50">
    Feature Importance for Apartment Price
  </text>
  
  <!-- Y-axis (features) -->
  <line x1="280" y1="60" x2="280" y2="570" stroke="#34495e" stroke-width="2"/>
  <!-- X-axis (importance) -->
  <line x1="280" y1="570" x2="850" y2="570" stroke="#34495e" stroke-width="2"/>
  
  <!-- X-axis label -->
  <text x="565" y="600" font-size="13" text-anchor="middle" fill="#2c3e50" font-weight="bold">
    Importance [USD]
  </text>
  
  <!-- Grid lines -->
  <line x1="280" y1="570" x2="850" y2="570" stroke="#bdc3c7" stroke-width="1"/>
  <line x1="380" y1="60" x2="380" y2="570" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="480" y1="60" x2="480" y2="570" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="580" y1="60" x2="580" y2="570" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="680" y1="60" x2="680" y2="570" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="780" y1="60" x2="780" y2="570" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="4,2"/>
  
  <!-- X-axis ticks and labels -->
  <line x1="380" y1="568" x2="380" y2="575" stroke="#34495e" stroke-width="1"/>
  <text x="380" y="590" font-size="11" text-anchor="middle" fill="#7f8c8d">20000</text>
  
  <line x1="480" y1="568" x2="480" y2="575" stroke="#34495e" stroke-width="1"/>
  <text x="480" y="590" font-size="11" text-anchor="middle" fill="#7f8c8d">40000</text>
  
  <line x1="580" y1="568" x2="580" y2="575" stroke="#34495e" stroke-width="1"/>
  <text x="580" y="590" font-size="11" text-anchor="middle" fill="#7f8c8d">60000</text>
  
  <line x1="680" y1="568" x2="680" y2="575" stroke="#34495e" stroke-width="1"/>
  <text x="680" y="590" font-size="11" text-anchor="middle" fill="#7f8c8d">80000</text>
  
  <line x1="780" y1="568" x2="780" y2="575" stroke="#34495e" stroke-width="1"/>
  <text x="780" y="590" font-size="11" text-anchor="middle" fill="#7f8c8d">100000</text>
  
  <!-- Feature bars (positive = green, negative = red) -->
  
  <!-- Size -->
  <text x="270" y="100" font-size="12" text-anchor="end" fill="#2c3e50">Size</text>
  <rect x="280" y="85" width="180" height="20" fill="url(#posGradient)" rx="2"/>
  <text x="465" y="100" font-size="11" fill="#2c3e50" font-weight="bold">€18,500</text>
  
  <!-- Latitude -->
  <text x="270" y="140" font-size="12" text-anchor="end" fill="#2c3e50">Latitude</text>
  <rect x="280" y="125" width="145" height="20" fill="url(#posGradient)" rx="2"/>
  <text x="430" y="140" font-size="11" fill="#2c3e50" font-weight="bold">€14,800</text>
  
  <!-- Longitude -->
  <text x="270" y="180" font-size="12" text-anchor="end" fill="#2c3e50">Longitude</text>
  <rect x="280" y="165" width="152" height="20" fill="url(#posGradient)" rx="2"/>
  <text x="437" y="180" font-size="11" fill="#2c3e50" font-weight="bold">€15,600</text>
  
  <!-- Neighborhood: Belgrano -->
  <text x="270" y="220" font-size="12" text-anchor="end" fill="#2c3e50">Belgrano</text>
  <rect x="280" y="205" width="125" height="20" fill="url(#posGradient)" rx="2"/>
  <text x="410" y="220" font-size="11" fill="#2c3e50" font-weight="bold">€12,300</text>
  
  <!-- Neighborhood: La Boca -->
  <text x="270" y="260" font-size="12" text-anchor="end" fill="#2c3e50">La Boca</text>
  <rect x="280" y="245" width="95" height="20" fill="url(#posGradient)" rx="2"/>
  <text x="380" y="260" font-size="11" fill="#2c3e50" font-weight="bold">€9,200</text>
  
  <!-- Neighborhood: Palermo -->
  <text x="270" y="300" font-size="12" text-anchor="end" fill="#2c3e50">Palermo</text>
  <rect x="280" y="285" width="165" height="20" fill="url(#posGradient)" rx="2"/>
  <text x="450" y="300" font-size="11" fill="#2c3e50" font-weight="bold">€16,800</text>
  
  <!-- Neighborhood: San Telmo -->
  <text x="270" y="340" font-size="12" text-anchor="end" fill="#2c3e50">San Telmo</text>
  <rect x="280" y="325" width="78" height="20" fill="url(#negGradient)" rx="2"/>
  <text x="363" y="340" font-size="11" fill="#2c3e50" font-weight="bold">-€7,500</text>
  
  <!-- Neighborhood: Recoleta -->
  <text x="270" y="380" font-size="12" text-anchor="end" fill="#2c3e50">Recoleta</text>
  <rect x="280" y="365" width="142" height="20" fill="url(#posGradient)" rx="2"/>
  <text x="427" y="380" font-size="11" fill="#2c3e50" font-weight="bold">€13,800</text>
  
  <!-- Neighborhood: Villa Crespo -->
  <text x="270" y="420" font-size="12" text-anchor="end" fill="#2c3e50">Villa Crespo</text>
  <rect x="280" y="405" width="55" height="20" fill="url(#negGradient)" rx="2"/>
  <text x="340" y="420" font-size="11" fill="#2c3e50" font-weight="bold">-€5,200</text>
  
  <!-- Neighborhood: Flores -->
  <text x="270" y="460" font-size="12" text-anchor="end" fill="#2c3e50">Flores</text>
  <rect x="280" y="445" width="48" height="20" fill="url(#negGradient)" rx="2"/>
  <text x="333" y="460" font-size="11" fill="#2c3e50" font-weight="bold">-€4,100</text>
  
  <!-- Legend -->
  <rect x="420" y="500" width="200" height="60" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3"/>
  <text x="430" y="520" font-size="12" font-weight="bold" fill="#2c3e50">Model Features:</text>
  <rect x="430" y="525" width="12" height="12" fill="#2a9d8f"/>
  <text x="450" y="533" font-size="11" fill="#7f8c8d">Positive impact (increases price)</text>
  <rect x="430" y="545" width="12" height="12" fill="#e76f51"/>
  <text x="450" y="553" font-size="11" fill="#7f8c8d">Negative impact (decreases price)</text>
</svg>